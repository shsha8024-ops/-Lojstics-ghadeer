<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
<title>المصروفات | شركة الغدير للنقل والتخليص الكمركي</title>
<style>
body {
  font-family: "Cairo", sans-serif;
  background: linear-gradient(180deg,#f7faff,#eef5ff);
  color: #000;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ===== الهيدر ===== */
header {
  background: linear-gradient(90deg,#003366,#004b95);
  color: #fff;
  padding: 1.2rem 2.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
  border-bottom: 3px solid #c2a356;
}
.brand {
  display: flex;
  align-items: center;
  gap: 16px;
}
.brand img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}
.brand-info span {
  font-size: 1.5rem;
  font-weight: 900;
}
.brand-info small {
  color: #f8e9b3;
  font-size: .95rem;
}
.back-btn {
  background: linear-gradient(90deg,#004b95,#008d5f);
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}
.back-btn:hover {
  background: #008d5f;
}

/* ===== المحتوى ===== */
main {
  flex: 1;
  max-width: 1000px;
  margin: 2rem auto;
  padding: 1.5rem;
  width: 95%;
}
h2 {
  text-align: center;
  color: #004b95;
  border-bottom: 2px solid #c2a356;
  padding-bottom: 6px;
  margin-bottom: 1.5rem;
}

/* ===== نموذج إضافة مصروف ===== */
.add-expense-form {
  background: #fff;
  padding: 1.5rem;
  border-radius: 14px;
  box-shadow: 0 4px 25px rgba(0,0,0,0.1);
  margin-bottom: 2rem;
}
.add-expense-form h3 {
  color: #004b95;
  text-align: center;
  margin-bottom: 1rem;
}
.add-expense-form input, .add-expense-form select {
  width: 100%;
  padding: 10px;
  margin: .5rem 0;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 1rem;
}
.add-expense-form button {
  display: block;
  margin: 1rem auto 0;
  padding: 10px 20px;
  background: linear-gradient(90deg,#004b95,#008d5f);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}
.add-expense-form button:hover {
  background: #008d5f;
  transform: translateY(-2px);
}

/* ===== جدول المصروفات ===== */
table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 25px rgba(0,0,0,0.1);
}
th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
  font-size: 1rem;
}
th {
  background: #f2f6fb;
  color: #003366;
  font-weight: 700;
}
tr:hover {
  background: #f9fbff;
}

/* ===== الفوتر ===== */
footer {
  background:#fafafa;
  text-align:center;
  padding:1.5rem;
  border-top:1px solid #ddd;
  color:#000;
  font-size:.95rem;
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="ghadeer-logo.png" alt="ghadeer logo">
    <div class="brand-info">
      <span>شركة الغدير</span><br>
      <small>للنقل والتخليص الكمركي</small>
    </div>
  </div>
  <button class="back-btn" onclick="window.location.href='home.html'">⬅️ رجوع</button>
</header>

<main>
  <h2>📒 إدارة المصروفات</h2>

  <form class="add-expense-form" id="expenseForm">
    <h3>➕ إضافة مصروف جديد</h3>
    <input type="text" id="expenseTitle" placeholder="📘 عنوان المصروف" required>
    <input type="number" id="expenseAmount" placeholder="💰 المبلغ (بالدينار)" required>
    <select id="expenseCategory">
      <option value="">📂 اختر التصنيف</option>
      <option>وقود</option>
      <option>صيانة</option>
      <option>إيجار</option>
      <option>رواتب</option>
      <option>نثريات</option>
      <option>أخرى</option>
    </select>
    <input type="date" id="expenseDate" required>
    <button type="submit">💾 حفظ المصروف</button>
  </form>

  <table id="expensesTable">
    <thead>
      <tr>
        <th>#</th>
        <th>العنوان</th>
        <th>التصنيف</th>
        <th>المبلغ</th>
        <th>التاريخ</th>
        <th>❌ حذف</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</main>

<footer>
  📍 زاخو – إبراهيم الخليل • 📞 07504084359 • 📧 starzeki001@gmail.com  
  <br>© 2026 شركة الغدير للنقل والتخليص الكمركي – جميع الحقوق محفوظة
</footer>

<script>
let expenses = JSON.parse(localStorage.getItem("ghadeerExpenses") || "[]");

function renderExpenses() {
  const tbody = document.querySelector("#expensesTable tbody");
  tbody.innerHTML = "";
  expenses.forEach((exp, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${exp.title}</td>
        <td>${exp.category || "-"}</td>
        <td>${exp.amount.toLocaleString()} د.ع</td>
        <td>${exp.date}</td>
        <td><button onclick="deleteExpense(${i})" style="background:#8b0000;color:#fff;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;">🗑</button></td>
      </tr>
    `;
  });
}

document.getElementById("expenseForm").addEventListener("submit", e => {
  e.preventDefault();
  const title = document.getElementById("expenseTitle").value.trim();
  const amount = parseFloat(document.getElementById("expenseAmount").value);
  const category = document.getElementById("expenseCategory").value;
  const date = document.getElementById("expenseDate").value;

  if (!title || !amount || !date) {
    alert("الرجاء تعبئة جميع الحقول المطلوبة.");
    return;
  }

  expenses.push({ title, amount, category, date });
  localStorage.setItem("ghadeerExpenses", JSON.stringify(expenses));
  renderExpenses();
  e.target.reset();
  alert("✅ تمت إضافة المصروف بنجاح.");
});

function deleteExpense(index) {
  if (!confirm("هل أنت متأكد من حذف هذا المصروف؟")) return;
  expenses.splice(index, 1);
  localStorage.setItem("ghadeerExpenses", JSON.stringify(expenses));
  renderExpenses();
}

renderExpenses();
</script>

</body>
</html>
