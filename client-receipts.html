<!-- =========================================
FILE: client-receipts.html   (قبوضات العميل / Payments)
URL example: client-receipts.html?client=CLIENT-001
========================================= -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>قبوضات العميل | شركة الغدير</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    :root{--radius:12px;--shadow:0 10px 30px rgba(0,0,0,0.12);--border:1px solid rgba(0,0,0,0.10);--gap:10px;--btn-h:40px;--btn-pad-x:14px;--btn-font:0.95rem;}
    html,body{height:100%;margin:0;font-family:"Cairo",sans-serif;background:linear-gradient(180deg,#f7faff,#eef5ff);color:#000;direction:rtl;overflow-x:hidden;}
    header{position:sticky;top:0;z-index:999;background:linear-gradient(90deg,#002b72,#0055a5,#c2a356);color:#fff;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;gap:var(--gap);box-shadow:0 4px 15px rgba(0,0,0,0.15);border-bottom:2px solid #eacb65;}
    .brand{display:flex;align-items:center;gap:10px;min-width:0;}
    .brand img{width:54px;height:54px;object-fit:contain;flex:0 0 auto}
    .brand-name span{font-size:1.15rem;font-weight:900;line-height:1.1;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand-name small{color:#fff8d9;font-size:0.85rem;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    nav{display:flex;align-items:center;gap:8px;}
    .nav-btn,.add-btn,.action-btn{height:var(--btn-h);padding:0 var(--btn-pad-x);border-radius:var(--radius);font-size:var(--btn-font);font-weight:800;line-height:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;border:0;cursor:pointer;transition:0.2s;box-sizing:border-box;}
    .nav-btn{color:#fff;background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.18);min-width:110px;}
    .nav-btn:hover{background:rgba(255,255,255,0.28);}
    .add-btn{margin:10px 0 14px;color:#fff;background:linear-gradient(90deg,#004b95,#008d5f);min-width:180px;}
    .add-btn:hover{transform:translateY(-1px);filter:brightness(0.98);}
    main{min-height:calc(100vh - 180px);max-width:1200px;margin:1.4rem auto;padding:1rem;}
    h2{text-align:center;color:#000;border-bottom:2px solid #c2a356;display:inline-block;padding-bottom:6px;margin-bottom:1rem;}
    .hint{text-align:center;color:rgba(0,0,0,0.65);font-weight:800;margin-top:6px;}
    .table-wrap{width:100%;overflow-x:auto;padding:10px;border-radius:var(--radius);background:transparent;}
    table{width:100%;min-width:700px;border-collapse:separate;border-spacing:0 10px;background:transparent;table-layout:auto;}
    thead th{background:#f4f4f4;font-weight:900;padding:12px 10px;text-align:center;white-space:nowrap;border:0;}
    tbody td{background:#fff;padding:12px 10px;text-align:center;white-space:nowrap;border-top:1px solid rgba(0,0,0,0.10);border-bottom:1px solid rgba(0,0,0,0.10);vertical-align:middle;}
    tbody td:first-child{border-right:1px solid rgba(0,0,0,0.10);border-top-right-radius:12px;border-bottom-right-radius:12px;}
    tbody td:last-child{border-left:1px solid rgba(0,0,0,0.10);border-top-left-radius:12px;border-bottom-left-radius:12px;}
    tbody tr:hover td{background:#f7fbff;}
    tfoot td{background:#fffbea;font-weight:900;padding:12px 10px;border:1px solid rgba(0,0,0,0.10);white-space:nowrap;}
    tfoot td:first-child{border-top-right-radius:12px;border-bottom-right-radius:12px;}
    tfoot td:last-child{border-top-left-radius:12px;border-bottom-left-radius:12px;}
    .link{cursor:pointer;color:#004b95;font-weight:900;text-decoration:underline;text-underline-offset:3px;}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(5px);justify-content:center;align-items:center;z-index:999;}
    .modal-content{background:#fff;border-radius:var(--radius);padding:1.2rem;width:92%;max-width:520px;color:#000;box-shadow:0 10px 30px rgba(0,0,0,0.20);}
    .modal-content input{width:100%;height:42px;padding:0 12px;margin-top:6px;border-radius:10px;border:1px solid #ccc;background:#fff;color:#000;box-sizing:border-box;}
    .action-btn{width:100%;margin-top:8px;justify-content:center;}
    .edit-btn{background:#00b894;color:#fff;}
    .delete-btn{background:#ff3b30;color:#fff;}
    .close-btn{background:#e7e7e7;color:#000;}
    footer{background:#fafafa;text-align:center;padding:1.2rem;color:#000;border-top:1px solid #ddd;}
    @media (max-width:640px){header{flex-wrap:wrap;justify-content:center;text-align:center;}nav{width:100%;justify-content:center;}.add-btn{min-width:100%;}}
  </style>
</head>
<body>
<header>
  <div class="brand">
    <img src="ghadeer-logo.png" alt="logo">
    <div class="brand-name">
      <span>شركة الغدير</span>
      <small>قبوضات العميل</small>
    </div>
  </div>
  <nav>
    <button class="nav-btn" type="button" onclick="history.back()">🔙 رجوع</button>
    <button class="nav-btn" type="button" id="goAccountBtn">👤 حساب العميل</button>
  </nav>
</header>

<main>
  <h2 id="title">قبوضات العميل</h2>
  <div class="hint" id="clientHint"></div>

  <button class="add-btn" type="button" onclick="openModal()">+ إضافة قبض</button>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>رقم القبض</th>
          <th>التاريخ</th>
          <th>ملاحظة</th>
          <th>المبلغ ($)</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot>
        <tr><td colspan="3">مجموع القبوضات</td><td id="total">0$</td></tr>
      </tfoot>
    </table>
  </div>
</main>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">إضافة قبض</h3>

    <label>التاريخ</label>
    <input type="date" id="pDate">

    <label>ملاحظة</label>
    <input type="text" id="pNote">

    <label>المبلغ ($)</label>
    <input type="number" id="pAmount" value="0" min="0" step="0.01">

    <button class="add-btn" id="saveBtn" type="button" onclick="savePayment()">حفظ</button>
    <button class="close-btn action-btn" type="button" onclick="closeModal()">إلغاء</button>
  </div>
</div>

<div id="viewModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-top:0;">تفاصيل القبض</h3>
    <div id="details" style="line-height:1.9;"></div>
    <button class="edit-btn action-btn" type="button" onclick="editCurrent()">✏️ تعديل</button>
    <button class="delete-btn action-btn" type="button" onclick="deleteCurrent()">🗑️ حذف</button>
    <button class="close-btn action-btn" type="button" onclick="closeView()">إغلاق</button>
  </div>
</div>

<footer>© 2026 شركة الغدير – جميع الحقوق محفوظة</footer>

<script>
  function loadJson(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
    catch { return fallback; }
  }
  function saveJson(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
  function money(n) { return (Number(n || 0)).toFixed(2) + '$'; }

  const qs = new URLSearchParams(window.location.search);
  const clientId = qs.get('client') || 'CLIENT-001';

  document.getElementById('title').textContent = `قبوضات ${clientId}`;
  document.getElementById('clientHint').textContent = `العميل: ${clientId}`;
  document.getElementById('goAccountBtn').addEventListener('click', () => {
    window.location.href = `client-account.html?client=${encodeURIComponent(clientId)}`;
  });

  let payments = loadJson('ghadeerClientPayments', []);
  let editIndex = null;
  let currentView = null;

  function persist(){ saveJson('ghadeerClientPayments', payments); }

  function clientPayments(){
    return payments.filter(p => p.clientId === clientId);
  }

  function render(){
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    let total = 0;

    const list = clientPayments().sort((a,b)=> (b.createdAt||0)-(a.createdAt||0));
    list.forEach((p, idx) => {
      total += p.amount;
      tbody.innerHTML += `
        <tr>
          <td class="link" onclick="viewPayment('${p.id}')">${p.id}</td>
          <td>${p.date}</td>
          <td>${p.note}</td>
          <td>${money(p.amount)}</td>
        </tr>`;
    });

    document.getElementById('total').textContent = money(total);
    persist();
  }

  function openModal(){
    editIndex = null;
    document.getElementById('modalTitle').textContent = 'إضافة قبض';
    document.getElementById('saveBtn').textContent = 'حفظ';
    document.getElementById('pDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('pNote').value = '';
    document.getElementById('pAmount').value = 0;
    document.getElementById('modal').style.display = 'flex';
  }
  function closeModal(){ document.getElementById('modal').style.display = 'none'; }

  function savePayment(){
    const date = document.getElementById('pDate').value;
    const note = document.getElementById('pNote').value.trim() || '—';
    const amount = parseFloat(document.getElementById('pAmount').value) || 0;
    if (!date) return alert('يرجى اختيار التاريخ');

    if (editIndex !== null){
      payments[editIndex] = { ...payments[editIndex], date, note, amount, updatedAt: Date.now() };
    } else {
      const clientList = clientPayments();
      const nextId = 'PAY-' + String(clientList.length + 1).padStart(3, '0');
      payments.push({ id: nextId, clientId, date, note, amount, createdAt: Date.now() });
    }

    persist();
    closeModal();
    render();
  }

  function viewPayment(id){
    const idx = payments.findIndex(p => p.id === id && p.clientId === clientId);
    if (idx < 0) return;
    currentView = id;
    const p = payments[idx];

    document.getElementById('details').innerHTML = `
      <b>رقم القبض:</b> ${p.id}<br>
      <b>التاريخ:</b> ${p.date}<br>
      <b>ملاحظة:</b> ${p.note}<br>
      <b>المبلغ:</b> ${money(p.amount)}
    `;
    document.getElementById('viewModal').style.display = 'flex';
  }

  function closeView(){ document.getElementById('viewModal').style.display = 'none'; }

  function editCurrent(){
    if (!currentView) return;
    const idx = payments.findIndex(p => p.id === currentView && p.clientId === clientId);
    if (idx < 0) return;
    editIndex = idx;

    const p = payments[idx];
    closeView();

    document.getElementById('modalTitle').textContent = 'تعديل قبض';
    document.getElementById('saveBtn').textContent = 'حفظ التعديلات';
    document.getElementById('pDate').value = p.date;
    document.getElementById('pNote').value = p.note;
    document.getElementById('pAmount').value = p.amount;
    document.getElementById('modal').style.display = 'flex';
  }

  function deleteCurrent(){
    if (!currentView) return;
    const idx = payments.findIndex(p => p.id === currentView && p.clientId === clientId);
    if (idx < 0) return;

    if (confirm('هل أنت متأكد من حذف هذا القبض؟')){
      payments.splice(idx, 1);
      persist();
      closeView();
      render();
    }
  }

  render();
</script>
</body>
</html>
