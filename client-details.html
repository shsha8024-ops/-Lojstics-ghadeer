<!-- /invoice-details.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  
<title>تفاصيل الفاتورة | شركة الغدير للنقل والتخليص المكرمي</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <div class="brand">
    <img src="ghadeer-logo.png" alt="ghadeer logo">
    <div class="brand-name">
      <span>شركة الغدير</span><br>
      <small>للنقل والتخليص المكرمي</small>
    </div>
  </div>
  <nav>
    <button class="nav-btn" onclick="history.back()">🔙 رجوع</button>
    <button class="nav-btn" onclick="window.location.href='home.html'">🏠 الرئيسية</button>
  </nav>
</header>

<main>
  <h2 id="invTitle">تفاصيل الفاتورة</h2>
  <button class="add-btn" onclick="openModal()">+ إضافة وصل جديد</button>

  <table>
    <thead>
      <tr>
        <th>رقم الوصل</th>
        <th>التاريخ</th>
        <th>اسم السائق</th>
        <th>رقم السيارة</th>
        <th>المحافظة</th>
        <th>ملاحظة</th>
        <th>المبلغ ($)</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
    <tfoot>
      <tr><td colspan="6">إجمالي الوصولات</td><td id="total">0$</td></tr>
    </tfoot>
  </table>
</main>

<!-- نافذة الإضافة / التعديل -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">إضافة وصل جديد</h3>
    <label>التاريخ</label>
    <input type="date" id="rDate">
    <label>اسم السائق</label>
    <input type="text" id="rDriver">
    <label>رقم السيارة</label>
    <input type="text" id="rCar">
    <label>المحافظة</label>
    <select id="rCity">
      <option>أربيل</option>
      <option>دهوك</option>
      <option>سليمانية</option>
      <option>نينوى</option>
      <option>أنبار</option>
    </select>
    <label>ملاحظة</label>
    <input type="text" id="rNote">
    <label>المبلغ ($)</label>
    <input type="number" id="rAmount" value="0">
    <button class="add-btn" id="saveBtn" onclick="saveReceipt()">حفظ الوصل</button>
    <button class="close-btn action-btn" onclick="closeModal()">إلغاء</button>
  </div>
</div>

<!-- نافذة التفاصيل والطباعة -->
<div id="viewModal" class="modal">
  <div class="modal-content">
    <div style="text-align:center;border-bottom:2px solid #c2a356;padding-bottom:10px;">
      <img src="ghadeer-logo.png" style="width:80px;height:80px;"><br>
      <strong style="font-size:1.2rem;color:#004b95;">شركة الغدير للنقل والتخليص المكرمي</strong><br>
      <span style="color:#c2a356;">وصل رسمي</span>
    </div>
    <div id="receiptDetails" style="margin-top:10px;line-height:1.8;text-align:right;"></div>
    <button class="edit-btn action-btn" onclick="editCurrent()">✏️ تعديل الوصل</button>
    <button class="delete-btn action-btn" onclick="deleteCurrent()">🗑️ حذف الوصل</button>
    <button class="print-btn action-btn" onclick="window.location.href='invoice-pdf.html'">🖨️ طباعة PDF</button>
    <button class="close-btn action-btn" onclick="closeView()">❌ إغلاق</button>
  </div>
</div>

<footer>
  © 2026 شركة الغدير للنقل والتخليص المكرمي – جميع الحقوق محفوظة
</footer>

<script>
const invId = new URLSearchParams(window.location.search).get('id') || 'فاتورة-001';
document.getElementById('invTitle').textContent = `تفاصيل ${invId}`;

let invoices = JSON.parse(localStorage.getItem('ghadeerInvoices') || '[]');
let invoice = invoices.find(i => i.id === invId);
if (!invoice) {
  invoice = { id: invId, receipts: [], total: 0 };
  invoices.push(invoice);
}
let editIndex = null;
let currentView = null;

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let total = 0;
  invoice.receipts.forEach((r, i) => {
    total += r.amount;
    tbody.innerHTML += `
      <tr>
        <td style="cursor:pointer;color:#004b95;" onclick="viewReceipt(${i})">${r.id}</td>
        <td>${r.date}</td>
        <td>${r.driver}</td>
        <td>${r.car}</td>
        <td>${r.city}</td>
        <td>${r.note}</td>
        <td>${r.amount.toFixed(2)}$</td>
      </tr>`;
  });
  document.getElementById('total').textContent = total.toFixed(2) + '$';
  invoice.total = total;
  localStorage.setItem('ghadeerInvoices', JSON.stringify(invoices));
}

function openModal() {
  editIndex = null;
  document.getElementById('modalTitle').textContent = 'إضافة وصل جديد';
  document.getElementById('saveBtn').textContent = 'حفظ الوصل';
  document.getElementById('rDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('rDriver').value = '';
  document.getElementById('rCar').value = '';
  document.getElementById('rCity').value = 'أربيل';
  document.getElementById('rNote').value = '';
  document.getElementById('rAmount').value = 0;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function saveReceipt() {
  const date = document.getElementById('rDate').value;
  const driver = document.getElementById('rDriver').value.trim();
  const car = document.getElementById('rCar').value.trim();
  const city = document.getElementById('rCity').value;
  const note = document.getElementById('rNote').value.trim() || '—';
  const amount = parseFloat(document.getElementById('rAmount').value) || 0;
  if (!driver || !car) return alert('يرجى إدخال اسم السائق ورقم السيارة');

  if (editIndex !== null) {
    invoice.receipts[editIndex] = { ...invoice.receipts[editIndex], date, driver, car, city, note, amount };
  } else {
    const nextId = 'RCPT-' + String(invoice.receipts.length + 1).padStart(3, '0');
    invoice.receipts.push({ id: nextId, date, driver, car, city, note, amount });
  }

  localStorage.setItem('ghadeerInvoices', JSON.stringify(invoices));
  closeModal();
  render();
}

function viewReceipt(i) {
  currentView = i;
  const r = invoice.receipts[i];
  localStorage.setItem('selectedReceipt', JSON.stringify({ invoiceId: invId, ...r, total: invoice.total }));
  document.getElementById('receiptDetails').innerHTML = `
    <b>رقم الوصل:</b> ${r.id}<br>
    <b>التاريخ:</b> ${r.date}<br>
    <b>اسم السائق:</b> ${r.driver}<br>
    <b>رقم السيارة:</b> ${r.car}<br>
    <b>المحافظة:</b> ${r.city}<br>
    <b>ملاحظة:</b> ${r.note}<br>
    <b>المبلغ:</b> ${r.amount.toFixed(2)}$
  `;
  document.getElementById('viewModal').style.display = 'flex';
}

function editCurrent() {
  if (currentView === null) return;
  const r = invoice.receipts[currentView];
  editIndex = currentView;
  closeView();
  document.getElementById('rDate').value = r.date;
  document.getElementById('rDriver').value = r.driver;
  document.getElementById('rCar').value = r.car;
  document.getElementById('rCity').value = r.city;
  document.getElementById('rNote').value = r.note;
  document.getElementById('rAmount').value = r.amount;
  document.getElementById('modalTitle').textContent = 'تعديل الوصل';
  document.getElementById('saveBtn').textContent = 'حفظ التعديلات';
  document.getElementById('modal').style.display = 'flex';
}

function deleteCurrent() {
  if (currentView === null) return;
  if (confirm('هل أنت متأكد من حذف هذا الوصل؟')) {
    invoice.receipts.splice(currentView, 1);
    localStorage.setItem('ghadeerInvoices', JSON.stringify(invoices));
    closeView();
    render();
  }
}

function closeView() { document.getElementById('viewModal').style.display = 'none'; }

render();
</script>
</body>
</html>
