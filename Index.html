<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">

<title>شركة الغدير للنقل والتخليص الكمركي | GHADIR LOGISTICS</title>
<link rel="icon" type="image/png" href="ghadeer-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
  --space: 1.1rem;
  --bg: #050c1d;
  --bg-soft: rgba(255,255,255,0.08);
  --surface: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.16);
  --text: #eef3ff;
  --muted: #9fb5d2;
  --accent: #66d0ff;
  --accent-strong: #ffca3a;
  --shadow: 0 20px 60px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
html,body{min-height:100%;margin:0;padding:0;scroll-behavior:smooth;}
body{
  font-family:'Cairo',sans-serif;
  color: var(--text);
  background: radial-gradient(circle at top left, rgba(102,208,255,0.18), transparent 24%),
              radial-gradient(circle at bottom right, rgba(255,202,58,0.16), transparent 22%),
              linear-gradient(180deg,#071028 0%,#01060f 100%);
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 20% 15%, rgba(102,208,255,0.14), transparent 16%),
              radial-gradient(circle at 80% 25%, rgba(255,202,58,0.11), transparent 12%);
  pointer-events:none;
}
header{width:100%;max-width:420px;margin:0 auto 1.5rem;padding:0 1rem;display:flex;flex-direction:column;align-items:center;gap:.75rem;}
header img{width:130px;height:auto;filter:drop-shadow(0 0 28px rgba(102,208,255,0.35));}
header h1{margin:0;font-size:1.7rem;font-weight:900;text-align:center;letter-spacing:.3px;}
header p{margin:0;color:var(--muted);font-size:0.98rem;line-height:1.6;text-align:center;max-width:320px;}
.login-box{
  width:min(100%,420px);
  padding:2rem;
  border-radius:28px;
  background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
  backdrop-filter: blur(20px);
  border:1px solid var(--border);
  box-shadow: var(--shadow);
}
.login-box h2{margin:0 0 1.5rem;font-size:1.5rem;color:#fff;}
input{
  width:100%;
  padding:1rem 1.1rem;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.08);
  color:#fff;
  font-size:1rem;
  margin:0.75rem 0;
}
input::placeholder{color:rgba(255,255,255,0.62);}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(102,208,255,0.15);background:rgba(255,255,255,0.12);}
button{
  width:100%;
  padding:1rem;
  border:none;
  border-radius:18px;
  font-size:1rem;
  font-weight:700;
  color:#08101d;
  background: linear-gradient(135deg, #66d0ff, #f7ce5c);
  cursor:pointer;
  transition:transform .25s ease, box-shadow .25s ease;
}
button:hover{transform:translateY(-2px);box-shadow:0 18px 35px rgba(102,208,255,0.22);}
.error{display:none;margin-top:1rem;color:#ff99a3;font-size:0.95rem;}
footer{width:100%;max-width:420px;margin:1.5rem auto 0;text-align:center;font-size:0.9rem;color:rgba(255,255,255,0.65);line-height:1.6;padding:0 1rem;}
@media (max-width:500px){header{padding-inline:1rem;}header img{width:110px;}header h1{font-size:1.4rem;} .login-box{padding:1.5rem;border-radius:22px;}button{padding:.95rem;}}
</style>
</head>

<body>

<header>
  <img src="ghadeer-logo.png" alt="ghadir logistics logo">
  <h1>شركة الغدير للنقل والتخليص الكمركي</h1>
</header>

<div class="login-box">
  <h2>تسجيل الدخول</h2>
  <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <p class="error" id="error">⚠️ اسم المستخدم أو كلمة المرور غير صحيحة</p>
</div>

<footer>© 2026 شركة الغدير للنقل والتخليص الكمركي – جميع الحقوق محفوظة</footer>

<script>
function login() {
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  if (user === "star" && pass === "star") {
    localStorage.setItem("loggedIn", "true");
    window.location.href = "home.html";
  } else {
    error.style.display = "block";
    setTimeout(() => error.style.display = "none", 3000);
  }
}

if (localStorage.getItem("loggedIn") === "true") {
  window.location.href = "home.html";
}
</script>

</body>
</html>
